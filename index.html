<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Checkerboard Drift — NE</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#ece7df;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // Two-tone checkerboard, drifting northeast (→↑). Pure Morandi.
  const COLOR_A = '#c9bfb1'; // Morandi taupe
  const COLOR_B = '#ece7df'; // warm off-white

  const SIZE  = 48;   // tile side length (px)
  const SPEED = 7;    // px/sec along each axis  → resultant ≈ 10 px/sec NE

  let W = 0, H = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const start = performance.now();

  function draw(now) {
    const t = (now - start) / 1000;

    // Scroll offsets — NE means x increases, y decreases (screen y down).
    // Use modulo 2*SIZE so checker parity stays consistent at the wrap.
    const period = SIZE * 2;
    let ox = ( SPEED * t) % period;
    let oy = (-SPEED * t) % period;
    if (ox < 0) ox += period;
    if (oy < 0) oy += period;

    // Background wash (shows briefly during the very first frame edges)
    ctx.fillStyle = COLOR_B;
    ctx.fillRect(0, 0, W, H);

    // Draw checkerboard. Start one tile before the viewport so wrap is seamless.
    // We compute integer tile indices for parity to know which color to fill.
    const startCol = -2, startRow = -2;
    const cols = Math.ceil(W / SIZE) + 4;
    const rows = Math.ceil(H / SIZE) + 4;

    // Translate so (col,row)=(0,0) sits at (ox - 2*SIZE, oy - 2*SIZE) effectively.
    // Easier: just iterate and place using i*SIZE + ox - 2*SIZE.
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = (startCol + c) * SIZE + ox;
        const y = (startRow + r) * SIZE + oy;

        // Parity for checkerboard: alternate by (c + r).
        const dark = ((c + r) & 1) === 0;
        ctx.fillStyle = dark ? COLOR_A : COLOR_B;
        ctx.fillRect(x, y, SIZE, SIZE);
      }
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
