<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixi 像素卡牌实验</title>
    <style>
      @font-face {
        font-family: 'Zpix';
        src: url('/fonts/zpix.ttf') format('truetype');
        font-display: block;
      }
      @font-face {
        font-family: 'Ark10';
        src: url('/fonts/ark10.woff2') format('woff2');
        font-display: block;
      }
      html, body { margin: 0; padding: 0; background: #1a1410; color: #f0e0c0; font-family: 'Zpix', -apple-system, system-ui, sans-serif; height: 100%; -webkit-font-smoothing: none; -moz-osx-font-smoothing: none; }
      #root { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
      h1 { margin: 0; font-size: 16px; letter-spacing: 2px; opacity: 0.7; }
      .stage-wrap { padding: 0; border: 2px solid #3a2f24; background: #0e0a07; image-rendering: pixelated; }
      .note { font-size: 12px; opacity: 0.5; max-width: 480px; text-align: center; line-height: 1.6; }
      canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
      /* 3行×2列对比网格：行标签 | 1:1卡 | 1:2卡 */
      .compare-grid {
        display: grid;
        grid-template-columns: 64px auto auto;
        align-items: end;
        gap: 16px 24px;
      }
      .row-label { margin: 0; font-size: 12px; opacity: 0.55; text-align: right; align-self: center; }
      .col-label { margin: 0; font-size: 12px; opacity: 0.4;  text-align: center; letter-spacing: 1px; align-self: end; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
